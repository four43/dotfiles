# gpg-agent configuration (symlinked to ~/.gnupg/gpg-agent.conf by dotbot).
#
# Used by `pass` and the VS Code secrets wrapper (bin/code-with-secrets). On the
# desktop, keychain.service preloads the GPG key at graphical login so the
# passphrase is entered once; these TTLs keep it cached for the rest of the day.
#
# After editing, apply with:  gpg-connect-agent reloadagent /bye

# Keep an unlocked key cached for a full workday (seconds). One unlock at login
# then lasts the session; the agent re-locks overnight.
default-cache-ttl 43200
max-cache-ttl 43200

# pinentry-auto picks pinentry-qt when DISPLAY/WAYLAND_DISPLAY is set
# (desktop session) and pinentry-curses otherwise (SSH / headless). gpg-agent
# inherits the caller's env per invocation, so the same agent handles both.
# Source: dotfiles/gnupg/pinentry-auto, symlinked to ~/.local/bin via dotbot.
pinentry-program /home/smiller/.local/bin/pinentry-auto
